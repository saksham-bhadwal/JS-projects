<!doctype html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="src/output.css" rel="stylesheet">
  <title>Movie Search App</title>
</head>

<body class="min-h-screen bg-[url('https://png.pngtree.com/thumb_back/fh260/background/20210902/pngtree-film-festival-black-atmospheric-background-image_784970.jpg')] bg-cover bg-center bg-no-repeat bg-fixed">
  <!-- Search Section -->
  <div class="flex justify-center pt-10">
    <form id="input" class="flex gap-3 w-full max-w-xl px-4">
      <input 
        type="text" 
        placeholder="Search movie..." 
        id="movie-name"
        class="flex-1 text-white border-2 rounded-lg pl-3 py-2 outline-none focus:border-blue-500"
      >
      <button 
        type="submit" 
        id="btn-1"
        class="border-2 rounded-lg px-5 py-2 text-white bg-blue-500 hover:bg-blue-700 transition"
      >
        Search
      </button>
    </form>
  </div>

  <!-- Movies Container -->
  <div 
    id="container" 
    class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 p-6 max-w-6xl mx-auto"
  >

    <!-- Movie Card Example -->
    <!-- <div class="bg-gray-500 rounded-xl shadow-md overflow-hidden hover:scale-105 transition"> -->
     

  </div>

  <script src="script.js"></script>
</body>

</html>
